name: Release

# Manually-triggered release workflow.
#   1. Runs the /release command via Claude Code to update CHANGELOG.md and README.md
#   2. Extracts the new version and release notes
#   3. Commits, tags, and pushes to main
#   4. Creates a GitHub Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type (auto detects from changelog headings)'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
      version:
        description: 'Explicit version (overrides bump type, e.g., 2.3.0 without v prefix)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Validate unreleased changes
        run: |
          CONTENT=$(awk '/^## \[Unreleased\]/{found=1; next} /^## \[/{exit} found{print}' CHANGELOG.md)
          if [ -z "$(echo "$CONTENT" | tr -d '[:space:]')" ]; then
            echo "::error::No unreleased changes found in CHANGELOG.md"
            exit 1
          fi
          echo "Unreleased content found:"
          echo "$CONTENT"

      - name: Build release command arguments
        id: args
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "release_args=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "release_args=${{ inputs.bump }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run /release command via Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          prompt: "/release ${{ steps.args.outputs.release_args }}"
          allowed_tools: "Read,Write,Edit,Glob,Grep"
          direct_prompt: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Determine version from updated changelog
        id: version
        run: |
          # Extract the newest versioned heading (first one after [Unreleased])
          VERSION=$(awk '/^## \[Unreleased\]/{next} /^## \[[0-9]+\.[0-9]+\.[0-9]+\]/{gsub(/.*\[|\].*/,""); print; exit}' CHANGELOG.md)
          if [ -z "$VERSION" ]; then
            echo "::error::Could not find new version in CHANGELOG.md after /release command"
            exit 1
          fi

          # Validate tag doesn't already exist
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "::error::Tag v${VERSION} already exists"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"

      - name: Extract release notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) { found=1; next }
            }
            found { print }
          ' CHANGELOG.md > release_notes.md

          echo "Release notes:"
          cat release_notes.md

      - name: Commit, tag, and push
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md README.md
          git commit -m "release: v${VERSION}"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin main --follow-tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          generate_release_notes: false
