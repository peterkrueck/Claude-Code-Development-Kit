name: Merge Release Branch

# Handles releases from Claude Code Web where the git proxy restricts
# direct pushes to main and tag creation. When the /release command
# pushes to a claude/release-v* branch, this workflow:
#   1. Fast-forwards main to the release commit
#   2. Creates an annotated tag (which triggers release.yml)
#   3. Cleans up the release branch

on:
  push:
    branches:
      - 'claude/release-v*'

permissions:
  contents: write

jobs:
  merge-and-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from branch name
        id: version
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          # claude/release-v2.3.0 → v2.3.0
          VERSION="${BRANCH#claude/release-}"
          VERSION_NUMBER="${VERSION#v}"
          echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "number=${VERSION_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION} (${VERSION_NUMBER})"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release commit
        run: |
          VERSION="${{ steps.version.outputs.number }}"
          if ! grep -q "## \[${VERSION}\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md does not contain a section for version ${VERSION}"
            exit 1
          fi

      - name: Fast-forward main to release commit
        run: |
          git checkout main
          git merge --ff-only "origin/${GITHUB_REF_NAME}"
          git push origin main

      - name: Create and push annotated tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

      - name: Delete release branch
        run: |
          git push origin --delete "${GITHUB_REF_NAME}" || true
